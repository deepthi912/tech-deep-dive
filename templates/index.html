<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>Tech Deep Dive</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            <line x1="12" y1="19" x2="12" y2="23"/>
                            <line x1="8" y1="23" x2="16" y2="23"/>
                        </svg>
                    </div>
                    <div>
                        <h1>Tech Deep Dive</h1>
                        <p class="tagline">One technology, one hour, every day</p>
                    </div>
                </div>
                <div></div>
            </div>
        </header>

        <!-- Status Banner -->
        <div id="statusBanner" class="status-banner hidden">
            <div class="spinner"></div>
            <span id="statusText">Generating episode...</span>
        </div>

        <!-- Now Playing -->
        <div id="nowPlaying" class="now-playing hidden">
            <div class="now-playing-card">
                <div class="episode-art">
                    <div class="art-bg" id="artBg"></div>
                    <div class="art-text">
                        <span class="art-day" id="artDay"></span>
                        <span class="art-tech" id="artTech"></span>
                    </div>
                    <div class="equalizer" id="equalizer">
                        <span></span><span></span><span></span><span></span><span></span>
                    </div>
                </div>
                <div class="player-info">
                    <h2 id="playerTitle"></h2>
                    <p id="playerCategory" class="category-badge"></p>
                </div>
                <div class="progress-container">
                    <input type="range" id="seekBar" class="seek-bar" min="0" max="100" value="0" step="0.1">
                    <div class="time-display">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
                <div class="player-controls">
                    <button id="rewindBtn" class="control-btn" title="Rewind 15s">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12.5 3C7.81 3 4.01 6.54 3.56 11H1l3.5 4 3.5-4H5.57C6.01 7.65 8.95 5 12.5 5c3.87 0 7 3.13 7 7s-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C7.88 20.1 10.05 21 12.5 21c4.97 0 9-4.03 9-9s-4.03-9-9-9z"/><text x="12.5" y="14.5" text-anchor="middle" font-size="7" font-weight="bold" fill="currentColor">15</text></svg>
                    </button>
                    <button id="playPauseBtn" class="control-btn play-btn" title="Play/Pause">
                        <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                        <svg id="pauseIcon" viewBox="0 0 24 24" fill="currentColor" class="hidden"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                    </button>
                    <button id="forwardBtn" class="control-btn" title="Forward 30s">
                        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M11.5 3c4.69 0 8.49 3.54 8.94 8H23l-3.5 4-3.5-4h2.01C17.99 7.65 15.05 5 11.5 5c-3.87 0-7 3.13-7 7s3.13 7 7 7c1.93 0 3.68-.79 4.94-2.06l1.42 1.42C16.12 20.1 13.95 21 11.5 21c-4.97 0-9-4.03-9-9s4.03-9 9-9z"/><text x="11.5" y="14.5" text-anchor="middle" font-size="7" font-weight="bold" fill="currentColor">30</text></svg>
                    </button>
                    <button id="speedBtn" class="control-btn speed-btn" title="Playback Speed">
                        <span id="speedLabel">1x</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Add Videos Section -->
        <div class="add-section">
            <div class="section-header">
                <h2>Add YouTube Videos</h2>
            </div>
            <div class="add-form">
                <textarea id="urlInput" class="url-input" rows="3" placeholder="Paste blog/doc URLs here (one per line)&#10;e.g. https://kafka.apache.org/documentation/"></textarea>
                <div class="add-form-row">
                    <input type="text" id="episodeTitle" class="title-input" placeholder="Episode title (e.g. Apache Kafka Deep Dive)">
                    <button id="addUrlsBtn" class="add-btn">Add</button>
                </div>
            </div>

            <!-- Queue -->
            <div id="queueSection" class="queue-section hidden">
                <div class="queue-header">
                    <span id="queueCount">0 videos queued</span>
                    <button id="generateFromQueue" class="generate-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                            <polygon points="5 3 19 12 5 21 5 3"/>
                        </svg>
                        Generate Podcast
                    </button>
                </div>
                <div id="queueList" class="queue-list"></div>
            </div>
        </div>

        <!-- Episode List -->
        <div class="episodes-section">
            <div class="section-header">
                <h2>Episodes</h2>
            </div>
            <div id="episodeList" class="episode-list">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading episodes...</p>
                </div>
            </div>
        </div>

        <!-- Summary Modal -->
        <div id="summaryModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>AI Summaries</h2>
                    <button id="closeSummary" class="icon-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                <div id="summaryContent" class="summary-list"></div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>
    <script src="/static/js/app.js"></script>
</body>
</html>
